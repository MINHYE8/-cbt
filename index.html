<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2554d9"><link rel="manifest" href="manifest.webmanifest">
<title>컴활 1급 필기 CBT</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--ink:#101827;--muted:#697386;--line:#e5e7eb;--blue:#2554d9;--green:#159947;--red:#d42f2f;--yellow:#fffbeb}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 14px}
h1{font-size:18px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:3px}main{max-width:820px;margin:0 auto 78px;padding:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.035)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button,select,input,textarea{font:inherit}button{border:0;border-radius:13px;padding:12px 10px;background:#e9efff;color:#173a9b;font-weight:800;line-height:1.2}
button.primary{background:var(--blue);color:white}button.ghost{background:#f3f4f6;color:#111827}button.danger{background:#fee2e2;color:#991b1b}button.good{background:#dcfce7;color:#166534}
button:disabled{opacity:.45}.small{font-size:13px;color:var(--muted);line-height:1.5}.stat{font-size:28px;font-weight:950;letter-spacing:-.04em}
select,input{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;background:#fff}textarea{width:100%;min-height:90px;border:1px solid var(--line);border-radius:13px;padding:10px}
.hidden{display:none!important}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.spacer{flex:1}.pill{display:inline-flex;padding:6px 9px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:800;margin:2px}
.meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px;margin-bottom:10px}.timer{font-variant-numeric:tabular-nums;font-weight:950;color:#111827}
.question{font-size:18px;line-height:1.48;font-weight:800;white-space:pre-wrap;word-break:keep-all}.choice{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);color:var(--ink);margin:7px 0;font-weight:650;line-height:1.38;white-space:pre-wrap}
.choice.selected{border-color:var(--blue);background:#eef2ff}.choice.correct{border-color:var(--green);background:#dcfce7}.choice.wrong{border-color:var(--red);background:#fee2e2}
hr{border:0;border-top:1px solid var(--line);margin:12px 0}.warn{background:var(--yellow);border:1px solid #fde68a;color:#92400e;border-radius:13px;padding:10px;font-size:13px;line-height:1.45}
footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:center;gap:6px;padding:8px env(safe-area-inset-right) calc(8px + env(safe-area-inset-bottom)) env(safe-area-inset-left)}
footer button{min-width:62px;padding:10px 8px;font-size:12px}.tag{font-size:12px;color:#374151;background:#f3f4f6;padding:5px 8px;border-radius:999px;display:inline-block;margin:2px}
</style></head><body>
<header><h1>컴활 1급 필기 CBT</h1><div class="sub" id="topSub">문제은행 로딩 중</div></header>
<main>
<section id="home">
  <div class="card">
    <div class="stat" id="homeScore">0 / 0</div>
    <div class="small">푼 문제 / 전체 문제 · 오답/즐겨찾기/메모는 이 기기에 저장됨</div>
  </div>
  <div class="card">
    <b>빠른 시작</b><br><br>
    <div class="grid">
      <button class="primary" onclick="start('all')">전체 문제</button>
      <button onclick="start('random20')">랜덤 20</button>
      <button onclick="start('random60')">랜덤 60</button>
      <button onclick="start('wrong')">오답만</button>
      <button onclick="start('fav')">즐겨찾기</button>
      <button class="danger" onclick="startExam()">실전 CBT 60분</button>
    </div>
  </div>
  <div class="card">
    <b>과목별</b><br><br>
    <div class="grid3">
      <button onclick="start('subject','컴퓨터 일반')">1과목<br>컴퓨터 일반</button>
      <button onclick="start('subject','스프레드시트 일반')">2과목<br>스프레드시트</button>
      <button onclick="start('subject','데이터베이스 일반')">3과목<br>DB 일반</button>
    </div>
  </div>
  <div class="card">
    <b>회차별</b><br><br>
    <select id="roundSelect"></select><br><br>
    <button class="primary" onclick="start('round',document.getElementById('roundSelect').value)">선택 회차 풀기</button>
  </div>
  <div class="card">
    <b>검색</b><p class="small">예: INDEX, 공유 통합 문서, RAID, IPv6, 머리글</p>
    <input id="searchInput" placeholder="검색어 입력"><br><br>
    <button onclick="doSearch()">검색 문제 풀기</button>
  </div>
  <div class="card warn">일부 그림/표 문제는 PDF 자동 추출 특성상 지문이 어색할 수 있어. 그래도 정답·선택지는 들어가게 만들었고, 필요한 문제는 원본 PDF 문제번호랑 같이 확인하면 돼.</div>
</section>

<section id="quiz" class="hidden">
  <div class="card">
    <div class="meta"><span id="progress"></span><span id="timer" class="timer"></span></div>
    <div class="row">
      <span class="pill" id="round"></span><span class="pill" id="subject"></span><span class="pill" id="qno"></span>
      <span class="spacer"></span><button class="ghost" id="favBtn" onclick="toggleFav()">☆</button>
    </div>
    <hr><div class="question" id="qtext"></div><div id="choices"></div>
    <div id="result" class="small"></div>
    <div id="explainBox" class="hidden"><hr><b>해설/메모</b><p id="explanation" class="small"></p>
      <textarea id="note" placeholder="내 해설·암기 포인트"></textarea><br><br><button class="ghost" onclick="saveNote()">메모 저장</button>
    </div>
  </div>
  <div class="row">
    <button class="ghost" onclick="prevQ()">이전</button><button class="primary" onclick="submitQ()">정답 확인</button>
    <button class="ghost" onclick="nextQ()">다음</button><button class="danger" onclick="finish()">채점</button>
  </div>
</section>

<section id="score" class="hidden">
  <div class="card"><div class="stat" id="scoreMain"></div><div class="small" id="scoreSub"></div></div>
  <div class="card" id="subjectScore"></div>
  <div class="grid"><button class="primary" onclick="showHome()">홈</button><button onclick="start('wrong')">오답 다시 풀기</button></div>
</section>
</main>
<footer><button onclick="showHome()">홈</button><button onclick="start('subject','컴퓨터 일반')">1과목</button><button onclick="start('subject','스프레드시트 일반')">2과목</button><button onclick="start('subject','데이터베이스 일반')">3과목</button><button onclick="start('wrong')">오답</button></footer>
<script src="data.js"></script>
<script>
const LS='comhwal-bank-v2'; let state=JSON.parse(localStorage.getItem(LS)||'{}');
state.answers=state.answers||{};state.wrong=state.wrong||{};state.fav=state.fav||{};state.notes=state.notes||{};
let list=[],idx=0,selected=null,checked=false,exam=false,endAt=null,tick=null,lastMode='';
function $(id){return document.getElementById(id)} function save(){localStorage.setItem(LS,JSON.stringify(state));updateHome()}
function hideAll(){['home','quiz','score'].forEach(x=>$(x).classList.add('hidden'))}
function updateHome(){ $('homeScore').textContent=Object.keys(state.answers).length+' / '+QUESTIONS.length; $('topSub').textContent=`${QUESTIONS.length}문제 · ${new Set(QUESTIONS.map(q=>q.round)).size}회분`; }
function showHome(){clearInterval(tick);hideAll();updateHome();$('home').classList.remove('hidden')}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function start(mode,arg){exam=false;clearInterval(tick);$('timer').textContent='';lastMode=mode;
 if(mode==='all') list=[...QUESTIONS];
 if(mode==='random20') list=shuffle(QUESTIONS).slice(0,20);
 if(mode==='random60') list=shuffle(QUESTIONS).slice(0,60);
 if(mode==='subject') list=QUESTIONS.filter(q=>q.subject===arg);
 if(mode==='round') list=QUESTIONS.filter(q=>q.round===arg);
 if(mode==='wrong') list=QUESTIONS.filter(q=>state.wrong[q.id]);
 if(mode==='fav') list=QUESTIONS.filter(q=>state.fav[q.id]);
 if(mode==='search') list=QUESTIONS.filter(q=>(q.question+' '+q.choices.join(' ')).toLowerCase().includes(arg.toLowerCase()));
 if(!list.length){alert('해당 문제가 없어.');return}
 idx=0;hideAll();$('quiz').classList.remove('hidden');render();}
function doSearch(){let v=$('searchInput').value.trim(); if(!v){alert('검색어 입력');return} start('search',v)}
function startExam(){exam=true;list=shuffle(QUESTIONS).slice(0,60);idx=0;endAt=Date.now()+60*60*1000;hideAll();$('quiz').classList.remove('hidden');tick=setInterval(updateTimer,1000);updateTimer();render()}
function updateTimer(){let ms=Math.max(0,endAt-Date.now()),m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);$('timer').textContent=`${m}:${String(s).padStart(2,'0')}`; if(ms<=0){clearInterval(tick);finish()}}
function render(){let q=list[idx];selected=state.answers[q.id]||null;checked=!exam&&!!selected;
 $('progress').textContent=`${idx+1} / ${list.length}`;$('round').textContent=q.round;$('subject').textContent=q.subject;$('qno').textContent=q.no+'번';$('favBtn').textContent=state.fav[q.id]?'★':'☆';
 $('qtext').textContent=q.question||'(지문 추출 확인 필요)';$('choices').innerHTML='';
 q.choices.forEach((c,i)=>{let n=i+1,b=document.createElement('button');b.className='choice';b.textContent=`${n}. ${c||'(보기 추출 확인 필요)'}`;if(selected===n)b.classList.add('selected');if(checked){if(n===q.answer)b.classList.add('correct');if(selected===n&&n!==q.answer)b.classList.add('wrong')}b.onclick=()=>{selected=n;state.answers[q.id]=n;save();render()};$('choices').appendChild(b)});
 $('result').textContent='';$('explainBox').classList.toggle('hidden',!checked);
 if(checked){$('result').innerHTML=selected===q.answer?'⭕ 정답':`❌ 오답 · 정답 ${q.answer}번`;$('explanation').textContent=q.explanation;$('note').value=state.notes[q.id]||''}
}
function submitQ(){let q=list[idx];if(!selected){alert('보기를 먼저 선택해.');return}checked=true;if(selected!==q.answer)state.wrong[q.id]=true;else delete state.wrong[q.id];save();render()}
function nextQ(){if(idx<list.length-1){idx++;render()}}function prevQ(){if(idx>0){idx--;render()}}
function toggleFav(){let q=list[idx];state.fav[q.id]?delete state.fav[q.id]:state.fav[q.id]=true;save();render()}
function saveNote(){let q=list[idx];state.notes[q.id]=$('note').value;save();alert('저장됨')}
function finish(){clearInterval(tick);let correct=0,total=list.length,subj={};list.forEach(q=>{let ok=state.answers[q.id]===q.answer;if(ok)correct++;subj[q.subject]=subj[q.subject]||[0,0];subj[q.subject][1]++;if(ok)subj[q.subject][0]++;if(state.answers[q.id]&&!ok)state.wrong[q.id]=true});save();hideAll();$('score').classList.remove('hidden');$('scoreMain').textContent=`${correct} / ${total}`;$('scoreSub').textContent=`정답률 ${Math.round(correct/Math.max(1,total)*100)}%`;$('subjectScore').innerHTML='<b>과목별 점수</b><br><br>'+Object.entries(subj).map(([k,v])=>`<div class="row"><span>${k}</span><span class="spacer"></span><b>${v[0]}/${v[1]}</b></div>`).join('<hr>')}
function init(){let rounds=[...new Set(QUESTIONS.map(q=>q.round))].sort();$('roundSelect').innerHTML=rounds.map(r=>`<option>${r}</option>`).join('');updateHome();showHome();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{})}
init();
</script></body></html>
