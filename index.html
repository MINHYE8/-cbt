<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2247d8"><link rel="manifest" href="manifest.webmanifest">
<title>컴활 1급 CBT</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#101827;--muted:#667085;--line:#e5e7eb;--blue:#2f54d8;--blue2:#e9efff;--red:#d93434;--red2:#fee2e2;--green:#149447;--green2:#dcfce7;--yellow:#fff7ed;--shadow:0 2px 10px rgba(15,23,42,.06)}
.dark{--bg:#0b1020;--card:#151b2d;--ink:#eef2ff;--muted:#98a2b3;--line:#29324a;--blue:#7c9cff;--blue2:#1d2a55;--red:#ff7b7b;--red2:#4a1f29;--green:#6ee7a8;--green2:#163826;--yellow:#392c1a;--shadow:none}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif}
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:13px 16px}
h1{font-size:20px;margin:0;font-weight:950;letter-spacing:-.04em}.sub{font-size:12px;color:var(--muted);margin-top:4px}
main{max-width:880px;margin:0 auto 84px;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin-bottom:13px;box-shadow:var(--shadow)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button,select,input,textarea{font:inherit}button{border:0;border-radius:15px;padding:13px 10px;background:var(--blue2);color:#153796;font-weight:900;line-height:1.2}
.dark button{color:#c7d2fe}button.primary{background:var(--blue);color:white}button.ghost{background:color-mix(in srgb,var(--card) 70%,var(--line));color:var(--ink)}button.danger{background:var(--red2);color:#991b1b}.dark button.danger{color:#fecaca}button.good{background:var(--green2);color:#166534}.dark button.good{color:#bbf7d0}
button:disabled{opacity:.45}.small{font-size:13px;color:var(--muted);line-height:1.55}.stat{font-size:34px;font-weight:1000;letter-spacing:-.06em}
select,input{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px;background:var(--card);color:var(--ink)}textarea{width:100%;min-height:94px;border:1px solid var(--line);border-radius:14px;padding:11px;background:var(--card);color:var(--ink)}
.hidden{display:none!important}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.spacer{flex:1}.pill{display:inline-flex;padding:6px 9px;border-radius:999px;background:var(--blue2);color:#2843a0;font-size:12px;font-weight:900;margin:2px}.dark .pill{color:#c7d2fe}
.meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px;margin-bottom:10px}.timer{font-variant-numeric:tabular-nums;font-weight:1000;color:var(--ink)}
.question{font-size:18px;line-height:1.55;font-weight:850;white-space:pre-wrap;word-break:keep-all}.choice{width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);color:var(--ink);margin:8px 0;font-weight:700;line-height:1.45;white-space:pre-wrap}
.choice.selected{border-color:var(--blue);background:var(--blue2)}.choice.correct{border-color:var(--green);background:var(--green2)}.choice.wrong{border-color:var(--red);background:var(--red2)}
hr{border:0;border-top:1px solid var(--line);margin:13px 0}.warn{background:var(--yellow);border:1px solid #fed7aa;color:#9a3412;border-radius:14px;padding:11px;font-size:13px;line-height:1.45}.dark .warn{color:#fed7aa}
.actionbar{display:none;position:fixed;left:0;right:0;bottom:72px;max-width:880px;margin:0 auto;z-index:25;background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:20px;padding:10px;margin:12px 0;box-shadow:var(--shadow)}
.actionbar .row{justify-content:space-between}.actionbar button{flex:1;min-width:0}
.omrWrap.collapsed #omr{display:none}.omrToggle{width:100%;margin-bottom:8px}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:center;gap:6px;padding:8px env(safe-area-inset-right) calc(8px + env(safe-area-inset-bottom)) env(safe-area-inset-left);z-index:30}
footer button{min-width:58px;padding:10px 8px;font-size:12px}

.versionBadge{position:fixed;right:10px;bottom:calc(64px + env(safe-area-inset-bottom));z-index:60;font-size:11px;font-weight:800;color:var(--muted);background:color-mix(in srgb,var(--card) 82%,transparent);border:1px solid var(--line);border-radius:999px;padding:5px 8px;backdrop-filter:blur(10px);opacity:.82}
.versionBadge:active{opacity:1}


.omrButton{width:100%;margin-top:8px}
.sheetBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:45;display:none}
.sheetBackdrop.show{display:block}
.omrSheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--card);border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--line);box-shadow:0 -8px 32px rgba(15,23,42,.18);transform:translateY(105%);transition:transform .22s ease;max-height:72vh;display:flex;flex-direction:column;padding:10px 14px calc(14px + env(safe-area-inset-bottom))}
.omrSheet.show{transform:translateY(0)}
.sheetHandle{width:46px;height:5px;border-radius:999px;background:var(--line);margin:4px auto 10px}
.sheetHead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sheetHead b{font-size:16px}.sheetBody{overflow:auto;padding-bottom:4px}
.sheetStats{font-size:13px;color:var(--muted)}
.stickyMini{position:sticky;top:72px;z-index:18;background:color-mix(in srgb,var(--card) 94%,transparent);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:18px;padding:8px;margin-bottom:10px;box-shadow:var(--shadow)}
.stickyMini .row{justify-content:space-between}.miniBtn{padding:9px 8px;font-size:13px}
.tag{font-size:12px;color:var(--muted);background:color-mix(in srgb,var(--card) 70%,var(--line));padding:5px 8px;border-radius:999px;display:inline-block;margin:2px}
.omr{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}.bubble{aspect-ratio:1;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:900;background:color-mix(in srgb,var(--card) 60%,var(--line));color:var(--muted)}.bubble.done{background:var(--blue);color:white}.bubble.wrong{background:var(--red);color:white}.bubble.current{outline:3px solid var(--green)}
.progressbar{height:8px;background:color-mix(in srgb,var(--card) 60%,var(--line));border-radius:999px;overflow:hidden}.progressbar>div{height:100%;background:var(--blue);width:0}
table{width:100%;border-collapse:collapse}td{padding:8px;border-bottom:1px solid var(--line);font-size:14px}.right{text-align:right;font-weight:900}
</style></head>
<body>
<header><h1>컴활 1급 필기 CBT</h1><div class="sub" id="topSub"></div></header>
<main>
<section id="home">
  <div class="card">
    <div class="row"><div><div class="stat" id="homeScore">0 / 0</div><div class="small">푼 문제 / 전체 문제 · 기록은 이 기기에 저장</div></div><span class="spacer"></span><button class="ghost" onclick="toggleDark()">🌙</button></div>
    <div class="progressbar" style="margin-top:12px"><div id="homeBar"></div></div>
  </div>
  <div class="card">
    <b>빠른 시작</b><br><br>
    <div class="grid">
      <button class="primary" onclick="start('all')">전체 문제</button><button onclick="start('random20')">랜덤 20</button>
      <button onclick="start('random40')">랜덤 40</button><button onclick="start('random60')">랜덤 60</button>
      <button onclick="start('wrong')">오답만</button><button onclick="start('fav')">즐겨찾기</button>
      <button class="danger" onclick="startExam()">실전 CBT 60분</button><button class="good" onclick="showStats()">통계</button>
    </div>
  </div>
  <div class="card"><b>과목별</b><br><br><div class="grid3">
    <button onclick="start('subject','컴퓨터 일반')">1과목<br>컴퓨터 일반</button>
    <button onclick="start('subject','스프레드시트 일반')">2과목<br>스프레드시트</button>
    <button onclick="start('subject','데이터베이스 일반')">3과목<br>DB 일반</button>
  </div></div>
  <div class="card"><b>회차별</b><br><br><select id="roundSelect"></select><br><br><button class="primary" onclick="start('round',$('roundSelect').value)">선택 회차 풀기</button></div>
  <div class="card"><b>검색 / 키워드별</b><p class="small">예: INDEX, 부분합, 공유 통합 문서, RAID, SQL</p><input id="searchInput" placeholder="검색어 입력"><br><br><div class="grid"><button onclick="doSearch()">검색 문제 풀기</button><button onclick="showTags()">자주 나오는 키워드</button></div></div>
  <div class="card warn">그림·표가 있는 일부 문제는 PDF 자동 추출 때문에 원본 배치와 다를 수 있어. 문제번호와 회차는 유지되어 있으니 헷갈리면 원본 PDF와 같이 보면 돼.</div>
</section>

<section id="quiz" class="hidden">
  <div class="card">
    <div class="meta"><span id="progress"></span><span id="timer" class="timer"></span></div>
    <div class="progressbar"><div id="quizBar"></div></div>
    <div class="stickyMini">
      <div class="row">
        <button class="ghost miniBtn" onclick="prevQ()">‹ 이전</button>
        <button class="primary miniBtn" onclick="submitQ()">정답</button>
        <button class="ghost miniBtn" onclick="nextQ()">다음 ›</button>
        <button class="danger miniBtn" onclick="finish()">채점</button>
      </div>
      <button class="ghost omrButton" onclick="openOMR()">📋 OMR 열기</button>
    </div>
    <div class="row" style="margin-top:10px"><span class="pill" id="round"></span><span class="pill" id="subject"></span><span class="pill" id="qno"></span><span class="spacer"></span><button class="ghost" id="favBtn" onclick="toggleFav()">☆</button></div>
    <hr><div class="question" id="qtext"></div><div id="tagBox"></div><div id="choices"></div><div id="result" class="small"></div>
    <div id="explainBox" class="hidden"><hr><b>해설/메모</b><p id="explanation" class="small"></p>
      <div class="grid"><button onclick="copyAIPrompt()">🤖 AI 설명 복사</button><button class="ghost" onclick="markHard()">어려움 표시</button></div><br>
      <textarea id="note" placeholder="내 해설·암기 포인트"></textarea><br><br><button class="ghost" onclick="saveNote()">메모 저장</button>
    </div>
  </div>
  <div class="sheetBackdrop" id="sheetBackdrop" onclick="closeOMR()"></div>
  <div class="omrSheet" id="omrSheet">
    <div class="sheetHandle"></div>
    <div class="sheetHead">
      <b>OMR</b>
      <span class="sheetStats" id="omrStats"></span>
      <span class="spacer"></span>
      <button class="ghost miniBtn" onclick="closeOMR()">닫기</button>
    </div>
    <div class="sheetBody">
      <div class="omr" id="omr"></div>
    </div>
  </div>
</section>

<section id="score" class="hidden"><div class="card"><div class="stat" id="scoreMain"></div><div class="small" id="scoreSub"></div></div><div class="card" id="subjectScore"></div><div class="grid"><button class="primary" onclick="showHome()">홈</button><button onclick="start('wrong')">오답 다시 풀기</button></div></section>
<section id="stats" class="hidden"><div class="card"><b>학습 통계</b><div id="statsBox"></div></div><div class="card"><b>약점 키워드</b><div id="weakTags"></div></div><button class="primary" onclick="showHome()">홈</button></section>
<section id="tags" class="hidden"><div class="card"><b>자주 나오는 키워드</b><p class="small">누르면 해당 키워드 문제만 풀 수 있어.</p><div id="tagList"></div></div><button class="primary" onclick="showHome()">홈</button></section>
</main>
<div class="versionBadge" onclick="alert('컴활 CBT v2.2.3\n업데이트: 하단 고정 버튼바 제거')">CBT v2.2.3</div>
<footer><button onclick="showHome()">홈</button><button onclick="start('subject','컴퓨터 일반')">1과목</button><button onclick="start('subject','스프레드시트 일반')">2과목</button><button onclick="start('subject','데이터베이스 일반')">3과목</button><button onclick="start('wrong')">오답</button></footer>
<script src="data.js"></script>
<script>
const LS='comhwal-cbt-v2233';let state=JSON.parse(localStorage.getItem(LS)||'{}');
state.answers=state.answers||{};state.wrong=state.wrong||{};state.fav=state.fav||{};state.notes=state.notes||{};state.hard=state.hard||{};state.dark=state.dark||false;
let list=[],idx=0,selected=null,checked=false,exam=false,endAt=null,tick=null;
function $(id){return document.getElementById(id)}function save(){localStorage.setItem(LS,JSON.stringify(state));updateHome()}
function hideAll(){['home','quiz','score','stats','tags'].forEach(x=>$(x).classList.add('hidden'))}
function applyTheme(){document.documentElement.classList.toggle('dark',!!state.dark)}function toggleDark(){state.dark=!state.dark;applyTheme();save()}
function updateHome(){let done=Object.keys(state.answers).length,total=QUESTIONS.length;$('homeScore').textContent=done+' / '+total;$('homeBar').style.width=(done/total*100)+'%';$('topSub').textContent=`${QUESTIONS.length}문제 · ${new Set(QUESTIONS.map(q=>q.round)).size}회분`}
function showHome(){clearInterval(tick);hideAll();updateHome();$('home').classList.remove('hidden')}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function start(mode,arg){exam=false;clearInterval(tick);$('timer').textContent='';
 if(mode==='all')list=[...QUESTIONS]; if(mode==='random20')list=shuffle(QUESTIONS).slice(0,20); if(mode==='random40')list=shuffle(QUESTIONS).slice(0,40); if(mode==='random60')list=shuffle(QUESTIONS).slice(0,60);
 if(mode==='subject')list=QUESTIONS.filter(q=>q.subject===arg); if(mode==='round')list=QUESTIONS.filter(q=>q.round===arg); if(mode==='wrong')list=QUESTIONS.filter(q=>state.wrong[q.id]); if(mode==='fav')list=QUESTIONS.filter(q=>state.fav[q.id]); if(mode==='search')list=QUESTIONS.filter(q=>(q.question+' '+q.choices.join(' ')+' '+(q.tags||[]).join(' ')).toLowerCase().includes(arg.toLowerCase()));
 if(!list.length){alert('해당 문제가 없어.');return}idx=0;hideAll();$('quiz').classList.remove('hidden');render()}
function doSearch(){let v=$('searchInput').value.trim();if(!v){alert('검색어 입력');return}start('search',v)}
function startExam(){exam=true;list=shuffle(QUESTIONS).slice(0,60);idx=0;endAt=Date.now()+60*60*1000;hideAll();$('quiz').classList.remove('hidden');tick=setInterval(updateTimer,1000);updateTimer();render()}
function updateTimer(){let ms=Math.max(0,endAt-Date.now()),m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);$('timer').textContent=`${m}:${String(s).padStart(2,'0')}`;if(ms<=0){clearInterval(tick);finish()}}
function render(){let q=list[idx];selected=state.answers[q.id]||null;checked=!exam&&!!selected;$('progress').textContent=`${idx+1} / ${list.length}`;$('quizBar').style.width=((idx+1)/list.length*100)+'%';$('round').textContent=q.round;$('subject').textContent=q.subject;$('qno').textContent=q.no+'번';$('favBtn').textContent=state.fav[q.id]?'★':'☆';$('qtext').textContent=q.question||'(지문 추출 확인 필요)';
 $('tagBox').innerHTML=(q.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
 $('choices').innerHTML='';q.choices.forEach((c,i)=>{let n=i+1,b=document.createElement('button');b.className='choice';b.textContent=`${n}. ${c||'(보기 추출 확인 필요)'}`;if(selected===n)b.classList.add('selected');if(checked){if(n===q.answer)b.classList.add('correct');if(selected===n&&n!==q.answer)b.classList.add('wrong')}b.onclick=()=>{selected=n;state.answers[q.id]=n;save();render()};$('choices').appendChild(b)});
 $('result').textContent='';$('explainBox').classList.toggle('hidden',!checked);if(checked){$('result').innerHTML=selected===q.answer?'⭕ 정답':`❌ 오답 · 정답 ${q.answer}번`;$('explanation').textContent=q.explanation;$('note').value=state.notes[q.id]||''}renderOMR()}
function renderOMR(){let h='';let done=0;list.forEach((q,i)=>{if(state.answers[q.id])done++;let cls='bubble '+(state.answers[q.id]?'done ':'')+(i===idx?'current ':'')+(!exam&&state.answers[q.id]&&state.answers[q.id]!==q.answer?'wrong ':'');h+=`<div class="${cls}" onclick="idx=${i};closeOMR();render()">${i+1}</div>`});$('omr').innerHTML=h;if($('omrStats'))$('omrStats').textContent=`${done}/${list.length} 표시`}
function openOMR(){$('sheetBackdrop').classList.add('show');$('omrSheet').classList.add('show')}
function closeOMR(){$('sheetBackdrop').classList.remove('show');$('omrSheet').classList.remove('show')}
function submitQ(){let q=list[idx];if(!selected){alert('보기를 먼저 선택해.');return}checked=true;if(selected!==q.answer)state.wrong[q.id]=true;else delete state.wrong[q.id];save();render()}
function nextQ(){if(idx<list.length-1){idx++;render()}}function prevQ(){if(idx>0){idx--;render()}}
function toggleFav(){let q=list[idx];state.fav[q.id]?delete state.fav[q.id]:state.fav[q.id]=true;save();render()}function markHard(){let q=list[idx];state.hard[q.id]=true;save();alert('어려움 표시 완료')}
function saveNote(){let q=list[idx];state.notes[q.id]=$('note').value;save();alert('저장됨')}
function copyAIPrompt(){let q=list[idx];let txt=`컴활 1급 필기 ${q.round} ${q.no}번 문제 설명해줘.\\n문제: ${q.question}\\n보기:\\n${q.choices.map((c,i)=>`${i+1}. ${c}`).join('\\n')}\\n정답: ${q.answer}\\n내가 고른 답: ${state.answers[q.id]||'미선택'}\\n왜 정답인지, 다른 보기는 왜 틀렸는지 컴활 시험 기준으로 짧고 정확하게 설명해줘.`;navigator.clipboard.writeText(txt).then(()=>alert('복사됨. ChatGPT에 붙여넣으면 설명 받을 수 있어.'))}
function finish(){clearInterval(tick);let correct=0,total=list.length,subj={};list.forEach(q=>{let ok=state.answers[q.id]===q.answer;if(ok)correct++;subj[q.subject]=subj[q.subject]||[0,0];subj[q.subject][1]++;if(ok)subj[q.subject][0]++;if(state.answers[q.id]&&!ok)state.wrong[q.id]=true});save();hideAll();$('score').classList.remove('hidden');$('scoreMain').textContent=`${correct} / ${total}`;$('scoreSub').textContent=`정답률 ${Math.round(correct/Math.max(1,total)*100)}%`;$('subjectScore').innerHTML='<b>과목별 점수</b><br><br>'+Object.entries(subj).map(([k,v])=>`<div class="row"><span>${k}</span><span class="spacer"></span><b>${v[0]}/${v[1]}</b></div>`).join('<hr>')}
function showStats(){hideAll();$('stats').classList.remove('hidden');let subj={};QUESTIONS.forEach(q=>{if(state.answers[q.id]){let s=subj[q.subject]||[0,0];s[1]++;if(state.answers[q.id]===q.answer)s[0]++;subj[q.subject]=s}});$('statsBox').innerHTML='<table>'+Object.entries(subj).map(([k,v])=>`<tr><td>${k}</td><td class="right">${v[0]}/${v[1]} (${Math.round(v[0]/v[1]*100)}%)</td></tr>`).join('')+'</table>';let weak={};QUESTIONS.forEach(q=>{if(state.answers[q.id]&&state.answers[q.id]!==q.answer)(q.tags||[]).forEach(t=>weak[t]=(weak[t]||0)+1)});$('weakTags').innerHTML=Object.entries(weak).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([t,n])=>`<button onclick="start('search','${t.replaceAll("'","\\'")}')">${t} · ${n}</button>`).join(' ')||'<p class="small">아직 약점 데이터가 없어.</p>'}
function showTags(){hideAll();$('tags').classList.remove('hidden');let freq={};QUESTIONS.forEach(q=>(q.tags||[]).forEach(t=>freq[t]=(freq[t]||0)+1));$('tagList').innerHTML=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,80).map(([t,n])=>`<button style="margin:4px" onclick="start('search','${t.replaceAll("'","\\'")}')">${t} ${n}</button>`).join('')}

let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;touchStartY=e.changedTouches[0].screenY},{passive:true});
document.addEventListener('touchend',e=>{if($('quiz').classList.contains('hidden'))return;let dx=e.changedTouches[0].screenX-touchStartX,dy=e.changedTouches[0].screenY-touchStartY;if(Math.abs(dx)>70&&Math.abs(dy)<60){if(dx<0)nextQ();else prevQ();}},{passive:true});

function init(){applyTheme();let rounds=[...new Set(QUESTIONS.map(q=>q.round))].sort();$('roundSelect').innerHTML=rounds.map(r=>`<option>${r}</option>`).join('');updateHome();showHome();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{})}
